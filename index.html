<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxon Base — Resume Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!--
    Nyxon Base — Resume Studio
    --------------------------
    This HTML file defines the page skeleton for the resume builder application.

    Key pieces:
    1. External libraries: Tailwind for utility styling and html2pdf for client-side PDF export.
    2. Google fonts: multiple font families are loaded to support rich typographic resume templates.
    3. Local stylesheet: styles.css contains the app-specific theme, layout, and sidebar styling.
    4. App shell: the UI is built around a header, a left sidebar editor, and a right preview pane.
    5. The page includes a dynamic editor surface that is populated and updated by script.js.
  -->
</head>
<body>

<!--
  Application shell:
  - #app-shell: root container that holds the full builder interface.
  - Header: top toolbar with mode tabs, demo/reset/export actions, and branding.
  - Sidebar: left-hand editor with input sections for personal info, experience, education, skills, and mode-specific options.
  - Preview area: right-hand live preview of the resume, cover letter, CV, or portfolio output.
  - AI Toast: a small notification overlay used to communicate when the preview is refreshing.
-->
<div id="app-shell">

  <!-- ====== HEADER ====== -->
  <header id="app-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="logo-mark">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <div>
        <div class="logo-text">Nyxon Base</div>
        <div class="logo-sub">Resume Studio</div>
      </div>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="resume" onclick="setMode('resume')">Resume</button>
      <button class="mode-tab" data-mode="cv" onclick="setMode('cv')">CV</button>
      <button class="mode-tab" data-mode="cover" onclick="setMode('cover')">Cover Letter</button>
      <button class="mode-tab" data-mode="portfolio" onclick="setMode('portfolio')">Portfolio</button>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <div class="demo-dropdown" style="position:relative;">
        <button class="hdr-btn" id="loadDemoBtn" onclick="toggleDemoMenu(event)">Load Demo</button>
        <div class="demo-menu" id="demoMenu" style="display:none;position:absolute;left:0;top:38px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:40;padding:4px;min-width:220px;">
          <button class="export-option" data-demo="ava" style="display:block;width:220px;text-align:left;padding:8px 12px;border:none;background:transparent;">Designer — Ava Bennett</button>
          <button class="export-option" data-demo="liam" style="display:block;width:220px;text-align:left;padding:8px 12px;border:none;background:transparent;">Engineer — Liam Park</button>
          <button class="export-option" data-demo="chen" style="display:block;width:220px;text-align:left;padding:8px 12px;border:none;background:transparent;">Academic — Dr. Chen Li</button>
        </div>
      </div>
      <button class="hdr-btn" onclick="resetAll()">Reset</button>

      <!-- Theme Toggle (Light / Dark) -->
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button class="theme-btn" id="theme-btn-dark" type="button" aria-label="Switch to dark theme" onclick="setTheme('dark')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="theme-btn" id="theme-btn-light" type="button" aria-label="Switch to light theme" onclick="setTheme('light')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2"/>
            <path d="M12 20v2"/>
            <path d="M4.93 4.93l1.41 1.41"/>
            <path d="M17.66 17.66l1.41 1.41"/>
            <path d="M2 12h2"/>
            <path d="M20 12h2"/>
            <path d="M4.93 19.07l1.41-1.41"/>
            <path d="M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
      </div>

      <div class="export-dropdown" id="exportDropdown">
        <button class="hdr-btn-export" onclick="toggleExportMenu(event)">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export
          <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="export-menu" id="exportMenu">
          <button class="export-option" onclick="exportToPDF()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
            <div>
              <div class="export-option-label">Export as PDF</div>
              <div class="export-option-sub">Best for sharing & printing</div>
            </div>
          </button>
          <button class="export-option" onclick="exportToDocx()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <div>
              <div class="export-option-label">Export as DOCX</div>
              <div class="export-option-sub">Editable Word document</div>
            </div>
          </button>
        </div>
      </div>
      <!-- Mobile hamburger menu and Edit/Preview toggle (visible on small screens) -->
      <button id="mobileMenuBtn" class="hdr-btn mobile-menu-btn" onclick="toggleMobileMenu()" aria-expanded="false" style="display:none;">☰ Menu</button>
      <button id="mobileViewToggle" class="hdr-btn mobile-view-toggle" aria-pressed="false" onclick="toggleMobileView()" style="display:none;">Show Preview</button>

      <!-- Mobile actions menu (contains demo profiles, reset, export, theme) -->
      <div id="mobileMenu" class="mobile-menu" style="display:none;">
        <div class="mobile-menu-inner">
          <button class="mobile-menu-item" onclick="toggleMobileDemoSubmenu()">Load Demo ▸</button>
          <div id="mobileDemoSubmenu" class="mobile-submenu" style="display:none;">
            <button class="mobile-menu-item" onclick="(window.loadAva ? window.loadAva() : window.loadDemoData('ava')); closeMobileMenu()">Designer — Ava Bennett</button>
            <button class="mobile-menu-item" onclick="(window.loadLiam ? window.loadLiam() : window.loadDemoData('liam')); closeMobileMenu()">Engineer — Liam Park</button>
            <button class="mobile-menu-item" onclick="(window.loadChen ? window.loadChen() : window.loadDemoData('chen')); closeMobileMenu()">Academic — Dr. Chen Li</button>
          </div>
          <button class="mobile-menu-item" onclick="resetAll(); closeMobileMenu();">Reset</button>
          <button class="mobile-menu-item" onclick="exportToPDF(); closeMobileMenu();">Export PDF</button>
          <button class="mobile-menu-item" onclick="exportToDocx(); closeMobileMenu();">Export DOCX</button>
          <div style="display:flex;gap:8px;padding-top:8px;">
            <button class="mobile-menu-item" onclick="setTheme('light'); closeMobileMenu();">Light</button>
            <button class="mobile-menu-item" onclick="setTheme('dark'); closeMobileMenu();">Dark</button>
          </div>
        </div>
      </div>

      <!-- Demo processing log (shows queued/processed demo profiles) -->
      <div id="demoLog" class="demo-log" aria-live="polite" aria-atomic="true"></div>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <div id="main-area">

    <!-- ====== SIDEBAR ====== -->
    <!--
      The left sidebar provides the editor controls for the current mode.
      It includes general resume sections plus mode-specific panels:
      - Template selector for resume and CV modes
      - Cover letter fields for cover mode
      - Portfolio project fields for portfolio mode
      The sidebar content is shown or hidden dynamically based on the selected mode.
    -->
    <aside id="sidebar">

      <!-- TEMPLATE SECTION -->
      <div class="sidebar-section" id="sec-template">
        <div class="section-header" onclick="toggleSection('sec-template')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
            Template
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-template-body">
          <div class="tpl-grid" id="templateGrid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- COVER STYLE SECTION -->
      <div class="sidebar-section" id="sec-cover-style" style="display:none;">
        <div class="section-header" onclick="toggleSection('sec-cover-style')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Letter Style
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-cover-style-body">
          <div class="style-grid" id="coverStyleGrid"></div>
        </div>
      </div>

      <!-- PORTFOLIO STYLE SECTION -->
      <div class="sidebar-section" id="sec-port-style" style="display:none;">
        <div class="section-header" onclick="toggleSection('sec-port-style')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Portfolio Layout
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-port-style-body">
          <div class="style-grid" id="portStyleGrid"></div>
        </div>
      </div>

      <!-- PERSONAL INFO -->
      <div class="sidebar-section">
        <div class="section-header" onclick="toggleSection('sec-info')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Identity
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-info-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input class="form-input" id="firstName" oninput="updatePreview()" placeholder="Alex">
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input class="form-input" id="lastName" oninput="updatePreview()" placeholder="Rivera">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Professional Title</label>
            <input class="form-input" id="title" oninput="updatePreview()" placeholder="Senior Product Designer">
          </div>
          <div class="form-group" id="targetJobGroup">
            <label class="form-label">Target Role <span style="color:rgba(122,122,153,0.6);font-weight:400;text-transform:none;">(highlights matching skills)</span></label>
            <input class="form-input" id="targetJob" oninput="updatePreview()" placeholder="Lead Designer at Acme Inc.">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" id="email" oninput="updatePreview()" placeholder="alex@example.com">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input class="form-input" id="phone" oninput="updatePreview()" placeholder="+1 555 000 0000">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Location</label>
              <input class="form-input" id="location" oninput="updatePreview()" placeholder="New York, NY">
            </div>
            <div class="form-group">
              <label class="form-label">Website</label>
              <input class="form-input" id="website" oninput="updatePreview()" placeholder="alexrivera.com">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">LinkedIn</label>
              <input class="form-input" id="linkedin" oninput="updatePreview()" placeholder="linkedin.com/in/yourname">
            </div>
            <div class="form-group">
              <label class="form-label">GitHub</label>
              <input class="form-input" id="github" oninput="updatePreview()" placeholder="github.com/username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Summary</label>
            <textarea class="form-textarea" id="summary" oninput="updatePreview()" placeholder="A brief professional summary or bio…" style="min-height:80px;"></textarea>
          </div>
          <div id="personalFields">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Date of Birth</label>
              <input class="form-input" id="dob" oninput="updatePreview()" placeholder="YYYY-MM-DD">
            </div>
            <div class="form-group">
              <label class="form-label">Gender</label>
              <input class="form-input" id="gender" oninput="updatePreview()" placeholder="e.g. Female / Male / Non-binary">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Nationality</label>
              <input class="form-input" id="nationality" oninput="updatePreview()" placeholder="e.g. United States">
            </div>
            <div class="form-group">
              <label class="form-label">Marital Status</label>
              <input class="form-input" id="maritalStatus" oninput="updatePreview()" placeholder="e.g. Single / Married">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Languages</label>
              <input class="form-input" id="languages" oninput="updatePreview()" placeholder="e.g. English (native), Spanish (fluent)">
            </div>
            <div class="form-group">
              <label class="form-label">Religion</label>
              <input class="form-input" id="religion" oninput="updatePreview()" placeholder="Optional">
            </div>
          </div>
          </div>
        </div>
      </div>

      <!-- EXPERIENCE -->
      <div class="sidebar-section" id="sec-exp-wrap">
        <div class="section-header" onclick="toggleSection('sec-exp')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Experience
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-exp-body">
          <div id="expList" style="display:flex;flex-direction:column;gap:8px;"></div>
          <button class="btn-add-item" onclick="addExperience()">+ Add Experience</button>
        </div>
      </div>

      <!-- EDUCATION -->
      <div class="sidebar-section" id="sec-edu-wrap">
        <div class="section-header" onclick="toggleSection('sec-edu')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
            Education
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-edu-body">
          <div id="eduList" style="display:flex;flex-direction:column;gap:8px;"></div>
          <button class="btn-add-item" onclick="addEducation()">+ Add Education</button>
        </div>
      </div>

      <!-- SKILLS -->
      <div class="sidebar-section" id="sec-skills">
        <div class="section-header" onclick="toggleSection('sec-skills')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            Skills
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-skills-body">
          <div class="skill-add-row">
            <input class="skill-add-input" id="skillInput" placeholder="e.g. Figma" onkeypress="handleSkillKeypress(event)">
            <button class="btn-add" onclick="addSkill()">Add</button>
          </div>
          <div class="skills-container" id="skillTags"></div>
        </div>
      </div>

      <!-- CERTIFICATIONS -->
      <div class="sidebar-section" id="sec-cert">
        <div class="section-header" onclick="toggleSection('sec-cert')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
            Certifications
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-cert-body">
          <div id="certList" style="display:flex;flex-direction:column;gap:8px;"></div>
          <button class="btn-add-item" onclick="addCertification()">+ Add Certification</button>
        </div>
      </div>

      <!-- REFERENCES (CV only) -->
      <div class="sidebar-section" id="sec-refs" style="display:none;">
        <div class="section-header" onclick="toggleSection('sec-refs')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            References
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-refs-body">
          <div id="refsList" style="display:flex;flex-direction:column;gap:8px;"></div>
          <button class="btn-add-item" onclick="addReference()">+ Add Reference</button>
        </div>
      </div>

      <!-- COVER LETTER FIELDS -->
      <div class="sidebar-section" id="sec-cover-fields" style="display:none;">
        <div class="section-header" onclick="toggleSection('sec-cover-f')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Letter Content
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-cover-f-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Company</label>
              <input class="form-input" id="clCompany" oninput="updateCoverLetter('company',this.value)" placeholder="Acme Inc.">
            </div>
            <div class="form-group">
              <label class="form-label">Role</label>
              <input class="form-input" id="clRole" oninput="updateCoverLetter('role',this.value)" placeholder="Lead Designer">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Opening paragraph</label>
            <textarea class="form-textarea" id="clIntro" oninput="updateCoverLetter('intro',this.value)" placeholder="Express your excitement and fit…"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Main body</label>
            <textarea class="form-textarea" id="clBody" oninput="updateCoverLetter('body',this.value)" placeholder="Highlight your key achievements…" style="min-height:90px;"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Closing</label>
            <textarea class="form-textarea" id="clClosing" oninput="updateCoverLetter('closing',this.value)" placeholder="Call to action and sign-off…"></textarea>
          </div>
        </div>
      </div>

      <!-- PORTFOLIO PROJECTS -->
      <div class="sidebar-section" id="sec-projects" style="display:none;">
        <div class="section-header" onclick="toggleSection('sec-proj')">
          <div class="section-title">
            <svg class="section-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            Projects
          </div>
          <svg class="section-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="section-body" id="sec-proj-body">
          <div id="projList" style="display:flex;flex-direction:column;gap:8px;"></div>
          <button class="btn-add-item" onclick="addProject()">+ Add Project</button>
        </div>
      </div>

    </aside>

    <!-- ====== PREVIEW ====== -->
    <!--
      The right preview area renders the selected document live.
      It contains a zoom control and a scalable preview canvas.
      The preview HTML is rebuilt whenever the user changes inputs,
      selects a template, or switches modes.
    -->
    <section id="preview-area">
      <div id="zoom-control">
        <span style="font-size:10px;color:var(--c-muted);">Zoom</span>
        <input type="range" min="0.4" max="1.2" step="0.05" value="0.85" oninput="updateZoom(this.value)">
        <span id="zoom-label">85%</span>
      </div>
      <div id="preview-scaler" style="transform:scale(0.85);">
        <div id="resumePreview" class="doc-page"></div>
      </div>
    </section>

  </div><!-- end main-area -->
</div><!-- end app-shell -->

<!-- AI Toast -->
<div id="ai-toast" class="hidden">
  <div class="ai-dot"></div>
  <span>Nyxon is refreshing your document…</span>
</div>

<script src="script.js"></script>
</body>
</html>
